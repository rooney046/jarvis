<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>JARVIS</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#000814;
color:#00d9ff;
height:100vh;
display:flex;
justify-content:center;
align-items:center;
background-image:
linear-gradient(rgba(0,217,255,.08) 1px, transparent 1px),
linear-gradient(90deg, rgba(0,217,255,.08) 1px, transparent 1px);
background-size:40px 40px;
}

.container{
width:95%;
max-width:900px;
padding:20px;
border:1px solid #00d9ff;
background:rgba(0,0,0,.85);
box-shadow:0 0 25px #00d9ff;
border-radius:15px;
}

.topbar{
display:flex;
justify-content:space-between;
align-items:center;
margin-bottom:20px;
}

.topbar h1{
letter-spacing:6px;
}

.topbar span{
font-size:12px;
opacity:.7;
}

.clock{
text-align:right;
}

#hora{
font-size:35px;
font-weight:bold;
}

.status{
margin-bottom:20px;
padding:10px;
border:1px solid #00d9ff;
text-align:center;
border-radius:10px;
}

.reactor{
width:220px;
height:220px;
margin:auto;
border-radius:50%;
border:3px solid #00d9ff;
display:flex;
justify-content:center;
align-items:center;
box-shadow:0 0 40px #00d9ff;
}

.core{
width:120px;
height:120px;
border-radius:50%;
background:#00d9ff;
box-shadow:0 0 60px #00d9ff;
}

.active{
animation:pulse 1s infinite;
}

@keyframes pulse{
50%{
transform:scale(1.1);
}
}

.response{
margin-top:30px;
padding:20px;
border-left:4px solid #00d9ff;
font-size:18px;
min-height:80px;
}

.input-area{
display:flex;
gap:10px;
margin-top:20px;
}

input{
flex:1;
padding:15px;
background:#001a2e;
border:1px solid #00d9ff;
color:white;
border-radius:10px;
}

button{
padding:15px 25px;
background:#00d9ff;
border:none;
font-weight:bold;
cursor:pointer;
border-radius:10px;
}
</style>

</head>
<body>

<div class="container">

<div class="topbar">
<div>
<h1>JARVIS</h1>
<span>SISTEMA ACTIVO</span>
</div>

<div class="clock">
<div id="hora"></div>
<div id="fecha"></div>
</div>
</div>

<div class="status">
🟢 Sistema en línea
</div>

<div class="reactor" id="reactor">
<div class="core"></div>
</div>

<div class="response" id="response">
Sistema iniciado. Soy JARVIS, su asistente personal.
</div>

<div class="input-area">
<input type="text" id="command" placeholder="Escribe un comando...">
<button onclick="sendCommand()">ENVIAR</button>
</div>

</div>

<script>

function actualizarHora(){

const ahora = new Date();

document.getElementById("hora").innerText =
ahora.toLocaleTimeString();

document.getElementById("fecha").innerText =
ahora.toLocaleDateString();

}

setInterval(actualizarHora,1000);
actualizarHora();

function hablar(texto){

const voz = new SpeechSynthesisUtterance(texto);

voz.lang = "es-ES";
voz.rate = 0.9;

speechSynthesis.speak(voz);

}

function sendCommand(){

const cmd =
document.getElementById("command")
.value.toLowerCase();

const response =
document.getElementById("response");

const reactor =
document.getElementById("reactor");

reactor.classList.add("active");

setTimeout(()=>{
reactor.classList.remove("active");
},2000);

if(cmd.includes("hola")){

response.innerHTML =
"Hola señor. ¿Cómo puedo ayudarle?";

hablar("Hola señor. ¿Cómo puedo ayudarle?");

}
else if(cmd.includes("hora")){

const hora =
new Date().toLocaleTimeString();

response.innerHTML =
"La hora actual es " + hora;

hablar("La hora actual es " + hora);

}
else if(cmd.includes("jarvis")){

response.innerHTML =
"Estoy operativo y listo para recibir órdenes.";

hablar("Estoy operativo y listo para recibir órdenes.");

}
else{

response.innerHTML =
"Comando no reconocido.";

hablar("Comando no reconocido.");

}

}

</script>

</body>
</html>
