<script>
const GEMINI_KEY = 'AIzaSyAb8RN6KSe38EvazhvnI8OV6oqKxwqAow_V5koxDkem_u-K0-7Q';
const GEMINI_URL = `https://generativelanguage.googleapis.com/v1beta/models/gemini-2.0-flash:generateContent?key=${GEMINI_KEY}`;
const SYSTEM = `Eres JARVIS, el asistente de IA personal del usuario, inspirado en el JARVIS de Iron Man.
- Hablas SIEMPRE en español
- SIEMPRE llamas al usuario "señor" en cada respuesta
- Eres inteligente, preciso, formal pero con personalidad
- Respuestas cortas y directas (máximo 3-4 oraciones)
- Usas frases como "Por supuesto, señor", "Entendido, señor", "A su servicio, señor"
- NUNCA dices que eres Gemini ni de Google. Eres JARVIS.
- Si preguntan la hora o clima, diles que lo ven en el panel superior`;

// CLOCK
function updateClock(){
  const n=new Date(),p=v=>String(v).padStart(2,'0');
  document.getElementById('clock').textContent=`${p(n.getHours())}:${p(n.getMinutes())}:${p(n.getSeconds())}`;
  const days=['DOM','LUN','MAR','MIÉ','JUE','VIE','SÁB'],months=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
  document.getElementById('date').textContent=`${days[n.getDay()]} ${n.getDate()} ${months[n.getMonth()]} ${n.getFullYear()}`;
}
setInterval(updateClock,1000);updateClock();

// WEATHER
(async()=>{
  try{
    const g=await fetch('https://ipapi.co/json/');
    const loc=await g.json();
    const r=await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${loc.latitude}&longitude=${loc.longitude}&current_weather=true&hourly=relative_humidity_2m`);
    const d=await r.json();
    const wi={0:'☀️',1:'🌤️',2:'⛅',3:'☁️',45:'🌫️',51:'🌦️',61:'🌧️',71:'❄️',80:'🌦️',95:'⛈️'};
    document.getElementById('weather').innerHTML=`
      <div class="w-item">${wi[d.current_weather.weathercode]||'🌡️'} <span class="w-val">${Math.round(d.current_weather.temperature)}°C</span></div>

      <div class="w-item">📍 <span>${loc.city||'Ubicación'}</span></div>`;
  }catch(e){document.getElementById('weather').innerHTML=`<div class="w-item">🌐 <span>Sin datos</span></div>`;}
})();

// HELPERS
function setStatus(t){document.getElementById('status').textContent=t;}
function addMsg(text,role){
  const chat=document.getElementById('chat');
  const d=document.createElement('div');
  d.className=`msg ${role}`;
  const lbl=document.createElement('span');
  lbl.className='lbl';lbl.textContent=role==='user'?'TÚ':'JARVIS';
  d.appendChild(lbl);d.appendChild(document.createTextNode(text));
  chat.appendChild(d);chat.scrollTop=chat.scrollHeight;
}
let typingEl=null;
function showTyping(){
  const chat=document.getElementById('chat');
  typingEl=document.createElement('div');
  typingEl.className='msg bot';
  typingEl.innerHTML='<span class="lbl">JARVIS</span><div class="dots"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>';
  chat.appendChild(typingEl);chat.scrollTop=chat.scrollHeight;
}
function removeTyping(){if(typingEl){typingEl.remove();typingEl=null;}}

// SPEAK
function speak(text){
  if(!window.speechSynthesis)return;
  window.speechSynthesis.cancel();
  const u=new SpeechSynthesisUtterance(text);
  u.lang='es-ES';u.rate=1.0;u.pitch=0.8;u.volume=1;
  const load=()=>{
    const voices=window.speechSynthesis.getVoices();
    const v=voices.find(x=>x.lang.startsWith('es')&&/male/i.test(x.name))||voices.find(x=>x.lang.startsWith('es'))||voices[0];
    if(v)u.voice=v;
    window.speechSynthesis.speak(u);
  };
  if(window.speechSynthesis.getVoices().length>0)load();
  else window.speechSynthesis.onvoiceschanged=load;
}

// ASK JARVIS (Gemini)
let isLoading=false;
async function askJarvis(text){
  if(!text.trim()||isLoading)return;

  addMsg(text,'user');
  setStatus('PROCESANDO...');
  showTyping();
  try{
    const res=await fetch(GEMINI_URL,{
      method:'POST',
      headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        system_instruction:{parts:[{text:SYSTEM}]},
        contents:[{parts:[{text}]}]
      })
    });
    const data=await res.json();
    const reply=data?.candidates?.[0]?.content?.parts?.[0]?.text||'No pude procesar esa solicitud, señor.';
    removeTyping();
    addMsg(reply,'bot');
    setStatus('SISTEMA LISTO');
    speak(reply);
  }catch(e){
    removeTyping();
    addMsg('Error de conexión, señor. Verifique su red.','bot');
    setStatus('ERROR DE RED');
  }finally{isLoading=false;}
}

// TEXT INPUT

  inp.value='';
  askJarvis(t);
}
document.getElementById('txtInput').addEventListener('keydown',e=>{if(e.key==='Enter')sendText();});

// VOICE
let recognition=null,isListening=false;
function toggleListening(){
  const SR=window.SpeechRecognition||window.webkitSpeechRecognition;
  if(!SR){addMsg('Su navegador no soporta reconocimiento de voz, señor.','bot');return;}
  if(isListening){try{recognition.stop();}catch(e){}stopListen();return;}
  recognition=new SR();
  recognition.lang='es-ES';recognition.continuous=false;recognition.interimResults=false;
  recognition.onstart=()=>{
    isListening=true;
    document.getElementById('reactorBtn').classList.add('listening');
    document.getElementById('reactorBtn').textContent='🔴';
    document.querySelectorAll('.wave-bar').forEach(b=>b.classList.add('anim'));
    document.getElementById('tapHint').textContent='ESCUCHANDO...';
    setStatus('ESCUCHANDO...');
  };
  recognition.onresult=e=>{const txt=e.results[0][0].transcript;stopListen();askJarvis(txt);};
  recognition.onerror=e=>{
    stopListen();
    if(e.error==='not-allowed'){setStatus('MICRÓFONO BLOQUEADO');addMsg('Necesito permiso de micrófono, señor. Toque el candado en su navegador.','bot');}
    else setStatus('ERROR DE VOZ');
  };
  recognition.onend=stopListen;
  try{recognition.start();}catch(e){setStatus('ERROR DE VOZ');}
}
function stopListen(){
  isListening=false;
  document.getElementById('reactorBtn').classList.remove('listening');
  document.getElementById('reactorBtn').textContent='🎙️';
  document.querySelectorAll('.wave-bar').forEach(b=>b.classList.remove('anim'));
  document.getElementById('tapHint').textContent='TOCA PARA HABLAR';
  setStatus('SISTEMA LISTO');
}

window.addEventListener('load',()=>{
  setTimeout(()=>speak('Sistema iniciado. Soy JARVIS, su asistente personal. Listo para servirle, señor.'),800);
});
</script>
